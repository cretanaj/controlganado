<h1>Animals</h1>
<div class="container">
    <div class="row mt-5">
        <div class="row mt-5">
            <div class="col-md-5">
                <form action="/import-csv" method="post" enctype="multipart/form-data">
                    <label for="formFile" class="form-label">Cargar Archivo CSV</label>
                    <input class="form-control" type="file" id="formFile" name="file" accept=".csv">
                    <button type="submit" class="btn btn-primary">Importar</button>
                </form>     
                    <form action="/animales" method="post">
                    <button type="submit" class="btn btn-primary">Exportar Archivo CSV</button>
                </form>            
            </div>           
        </div>        
    </div>    
</div>
